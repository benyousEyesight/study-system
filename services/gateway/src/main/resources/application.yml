server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/roles/**,/api/permissions/**,/api/tenants/**
        - id: question-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/subjects/**,/api/knowledge-points/**,/api/questions/**
        - id: paper-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/papers/**,/api/paper-templates/**,/api/exams/**,/api/my-exams/**,/api/grading/**

jwt:
  secret: study-system-secret-key-change-in-prod-must-be-at-least-256-bits

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
